kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
    - tag

services:
  - name: mariadb
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: thornotes_test
      MARIADB_USER: thornotes
      MARIADB_PASSWORD: thornotes

steps:

# ── Lint ─────────────────────────────────────────────────────────────────────

  - name: discord-lint-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"

  - name: lint
    image: golangci/golangci-lint:latest
    commands:
      - golangci-lint run --timeout 5m ./...

  - name: discord-lint-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - success

  - name: discord-lint-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Lint Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - failure

# ── JS Tests ──────────────────────────────────────────────────────────────────

  - name: discord-test-js-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - JS Test Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"

  - name: test-js
    image: node:lts
    commands:
      - node --test web/static/js/table-utils.test.js
      - npm install --prefix web/cm6-bundle
      - node --test web/cm6-bundle/index.test.mjs

  - name: discord-test-js-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - JS Test Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - success

  - name: discord-test-js-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - JS Test Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - failure

# ── Go Tests ──────────────────────────────────────────────────────────────────

  - name: discord-test-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"

  - name: test
    image: golang:1.26
    environment:
      THORNOTES_TEST_MYSQL_DSN: "thornotes:thornotes@tcp(mariadb:3306)/thornotes_test?parseTime=true"
    commands:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -func=coverage.out | tail -1

  - name: discord-test-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - success

  - name: discord-test-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Test Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      status:
        - failure

# ── Android APK ──────────────────────────────────────────────────────────────
# Runs on every push/PR. Release APK is built only on v* tags.

  - name: discord-android-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Android Build Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - disabled

  - name: build-android
    image: mingc/android-build-box:latest
    volumes:
      - name: gradle-home
        path: /root/.gradle
    environment:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx1024m -Dfile.encoding=UTF-8"
    commands:
      - java -version
      - cd android
      - ./gradlew --no-daemon --version
      - |
        if [ -n "$DRONE_TAG" ]; then
          ./gradlew --no-daemon test assembleDebug assembleRelease
        else
          ./gradlew --no-daemon test assembleDebug
        fi
    when:
      branch:
        - disabled

  - name: discord-android-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Android Build Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - disabled
      status:
        - success

  - name: discord-android-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Android Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - disabled
      status:
        - failure

# ── Docker Build & Push ───────────────────────────────────────────────────────
# Only runs on push to main or v* tags.

  - name: discord-build-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: build-push
    image: plugins/docker
    settings:
      repo: th0rn0/thornotes
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      tags:
        - latest
    when:
      branch:
        - main
      event:
        - push

  - name: build-push-release
    image: plugins/docker
    settings:
      repo: th0rn0/thornotes
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      tags:
        - latest
        - ${DRONE_TAG}
    when:
      event:
        - tag

  - name: discord-build-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - success

  - name: discord-build-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - failure

# ── Smoke Test ────────────────────────────────────────────────────────────────

  - name: discord-smoke-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Started!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: smoke-test
    image: docker:27
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker pull th0rn0/thornotes:latest
      - |
        STEP_NET=$(docker inspect "$(cat /etc/hostname)" \
          -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
          2>/dev/null | awk '{print $1}')
        echo "Step network: ${STEP_NET:-bridge}"
        docker rm -f thornotes-smoke 2>/dev/null || true
        docker run -d --name thornotes-smoke \
          ${STEP_NET:+--network "$STEP_NET"} \
          --tmpfs /data \
          th0rn0/thornotes:latest
        IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' thornotes-smoke)
        echo "Container IP: $IP"
        for i in $(seq 1 30); do
          wget -qO- --timeout=3 "http://$IP:8080/" > /dev/null 2>&1 && echo "Server is up (attempt $i)" && docker stop thornotes-smoke && docker rm thornotes-smoke && exit 0
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Server did not respond"
        docker logs thornotes-smoke
        docker stop thornotes-smoke
        docker rm thornotes-smoke
        exit 1
    when:
      branch:
        - main
      event:
        - push
        - tag

  - name: discord-smoke-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Success!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - success

  - name: discord-smoke-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - $DRONE_SOURCE_BRANCH - Smoke Test Failure!\",\"url\":\"$DRONE_BUILD_LINK\"}]}"
    when:
      branch:
        - main
      event:
        - push
        - tag
      status:
        - failure

# ── Linux Server Binary ───────────────────────────────────────────────────────
# Builds a static linux/amd64 binary. Only runs on v* tags.

  - name: build-linux-binary
    image: golang:1.26-bookworm
    commands:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o thornotes-linux-amd64 ./cmd/thornotes
    when:
      event:
        - tag

# ── Linux Desktop AppImage ────────────────────────────────────────────────────
# Builds the WebKitGTK desktop app and packages it as an AppImage.
# Only runs on v* tags.

  - name: build-desktop
    image: golang:1.26-bookworm
    environment:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      DEBIAN_FRONTEND: noninteractive
    commands:
      - apt-get update -qq && apt-get install -y -qq gcc pkg-config libwebkit2gtk-4.0-dev libgtk-3-dev curl file
      - VERSION=$(cat VERSION | xargs)
      - mkdir -p build AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
      - cd desktop && go build -ldflags="-s -w" -o ../build/thornotes-desktop . && cd ..
      - cp build/thornotes-desktop AppDir/usr/bin/thornotes-desktop
      - cp desktop/assets/thornotes-desktop.png AppDir/usr/share/icons/hicolor/256x256/apps/thornotes-desktop.png
      - cp desktop/assets/thornotes-desktop.desktop AppDir/
      - cp desktop/assets/thornotes-desktop.png AppDir/thornotes-desktop.png
      - printf '#!/bin/sh\nexec "$APPDIR/usr/bin/thornotes-desktop" "$@"\n' > AppDir/AppRun && chmod +x AppDir/AppRun
      - curl -fsSL -o /usr/local/bin/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage && chmod +x /usr/local/bin/linuxdeploy
      - curl -fsSL -o /usr/local/bin/linuxdeploy-plugin-gtk https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh && chmod +x /usr/local/bin/linuxdeploy-plugin-gtk
      - curl -fsSL -o /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage && chmod +x /usr/local/bin/appimagetool
      - OUTPUT="thornotes-desktop-v${VERSION}-linux-amd64.AppImage" linuxdeploy --appdir AppDir --plugin gtk --output appimage
    when:
      event:
        - tag

# ── GitHub Release ────────────────────────────────────────────────────────────
# Only runs on v* tags.

  - name: release
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add -q curl jq
      - VERSION=$(cat VERSION | xargs)
      - BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} found && /^## \\[/{exit} found{print}" CHANGELOG.md)
      - |
        curl -s -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$DRONE_REPO/releases" \
          -d "{\"tag_name\":\"v${VERSION}\",\"name\":\"v${VERSION}\",\"body\":$(echo "$BODY" | jq -Rs .)}"
    when:
      event:
        - tag

  - name: release-linux
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add -q curl jq
      - VERSION=$(cat VERSION | xargs)
      - |
        UPLOAD_URL=$(curl -s --fail \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://api.github.com/repos/$DRONE_REPO/releases/tags/v${VERSION}" \
          | jq -r '.upload_url' | sed 's/{?name,label}//')
        [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "null" ] || { echo "ERROR: no upload_url from GitHub API"; exit 1; }
        curl -s --fail -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @"thornotes-linux-amd64" \
          "${UPLOAD_URL}?name=thornotes-linux-amd64"
        APPIMAGE=$(ls thornotes-desktop-v${VERSION}-linux-amd64.AppImage 2>/dev/null || true)
        if [ -n "$APPIMAGE" ]; then
          curl -s --fail -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APPIMAGE" \
            "${UPLOAD_URL}?name=${APPIMAGE}"
        fi
    when:
      event:
        - tag

  - name: discord-released
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        VERSION=$(cat VERSION | xargs)
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - v${VERSION} Released!\",\"url\":\"https://github.com/$DRONE_REPO/releases/tag/v${VERSION}\"}]}"
    when:
      event:
        - tag
      status:
        - success

# ── Android Release ──────────────────────────────────────────────────────────
# Attaches the unsigned release APK to the GitHub release. Only runs on v* tags.

  - name: release-android
    image: alpine:latest
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add -q curl jq
      - VERSION=$(cat VERSION | xargs)
      - APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
      - |
        [ -f "$APK" ] || { echo "ERROR: APK not found at $APK"; exit 1; }
      - |
        UPLOAD_URL=$(curl -s --fail \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://api.github.com/repos/$DRONE_REPO/releases/tags/v${VERSION}" \
          | jq -r '.upload_url' | sed 's/{?name,label}//')
        [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "null" ] || { echo "ERROR: no upload_url from GitHub API"; exit 1; }
        curl -s --fail -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary @"$APK" \
          "${UPLOAD_URL}?name=thornotes-v${VERSION}-android-unsigned.apk"
    when:
      event:
        - tag
      branch:
        - disabled

  - name: discord-android-released
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        VERSION=$(cat VERSION | xargs)
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO - v${VERSION} - Android APK attached!\",\"url\":\"https://github.com/$DRONE_REPO/releases/tag/v${VERSION}\"}]}"
    when:
      event:
        - tag
      status:
        - success

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
  - name: gradle-home
    host:
      path: /var/cache/drone/gradle-home
