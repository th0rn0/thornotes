<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — thornotes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.7; color: #222; background: #fff; }
.container { max-width: 700px; margin: 60px auto; padding: 0 24px; }
h1.note-title { font-size: 26px; margin-bottom: 6px; letter-spacing: -0.5px; }
.meta { font-size: 12px; color: #999; margin-bottom: 32px; }
.content h1 { font-size: 22px; margin: 24px 0 12px; }
.content h2 { font-size: 18px; margin: 20px 0 10px; }
.content h3 { font-size: 15px; margin: 16px 0 8px; }
.content p { margin-bottom: 12px; }
.content ul, .content ol { padding-left: 24px; margin-bottom: 12px; }
.content li { margin-bottom: 4px; }
.content code { background: #f5f5f5; padding: 1px 5px; font-size: 13px; font-family: monospace; border-radius: 2px; }
.content pre { background: #f5f5f5; padding: 14px; margin-bottom: 14px; overflow-x: auto; border-radius: 2px; }
.content pre code { background: none; padding: 0; }
.content blockquote { border-left: 3px solid #ddd; padding-left: 14px; color: #666; margin-bottom: 12px; }
.content a { color: #222; }
.footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #eee; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="container">
  <h1 class="note-title">{{.Title}}</h1>
  <p class="meta">Shared via thornotes · Last updated {{.UpdatedAt.Format "Jan 2, 2006"}}</p>
  <div class="content" id="content"></div>
  <div class="footer">Powered by <a href="https://github.com/th0rn0/thornotes">thornotes</a> — self-hosted markdown notes</div>
</div>
<script src="/static/js/vendor/marked.min.js"></script>
<script>
  const raw = {{.Content | printf "%q"}};
  document.getElementById('content').innerHTML = marked.parse(raw);
</script>
</body>
</html>
