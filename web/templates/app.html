<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thornotes</title>
<link rel="stylesheet" href="/static/css/font-awesome.min.css">
<link rel="stylesheet" href="/static/css/easymde.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; height: 100vh; overflow: hidden; }

/* AUTH */
#auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; }
.auth-box { background: #fff; border: 1px solid #ccc; padding: 32px; width: 320px; }
.auth-box h1 { font-size: 18px; margin-bottom: 4px; letter-spacing: -0.5px; }
.auth-box .tagline { font-size: 11px; color: #888; margin-bottom: 24px; }
.auth-box label { display: block; font-size: 11px; color: #555; margin-bottom: 4px; }
.auth-box input { display: block; width: 100%; border: 1px solid #ccc; padding: 7px 10px; font-size: 13px; margin-bottom: 14px; }
.auth-box button { width: 100%; background: #222; color: #fff; border: none; padding: 8px; font-size: 13px; cursor: pointer; }
.auth-box button:hover { background: #444; }
.auth-box .switch-link { text-align: center; margin-top: 14px; font-size: 11px; color: #888; }
.auth-box .switch-link a { color: #444; cursor: pointer; }
.auth-box .error { color: #c00; font-size: 11px; margin-top: 8px; }

/* APP */
#app-screen { display: none; height: 100vh; flex-direction: column; }
.topbar { display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #ddd; padding: 0 12px; height: 38px; flex-shrink: 0; }
.topbar .logo { font-size: 14px; font-weight: 600; letter-spacing: -0.5px; }
.topbar .user { font-size: 11px; color: #888; }
.topbar .user button { background: none; border: none; color: #555; cursor: pointer; font-size: 11px; }
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 220px; flex-shrink: 0; background: #fafafa; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-toolbar { display: flex; gap: 4px; padding: 8px; border-bottom: 1px solid #eee; }
.sidebar-toolbar button { flex: 1; padding: 5px 0; font-size: 11px; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #333; }
.sidebar-toolbar button:hover { background: #f0f0f0; }
.sidebar-search { padding: 6px 8px; border-bottom: 1px solid #eee; }
.sidebar-search input { width: 100%; border: 1px solid #ddd; padding: 4px 8px; font-size: 12px; }
.tree { flex: 1; overflow-y: auto; padding: 4px 0; }
.tree-folder-label { display: flex; align-items: center; gap: 4px; padding: 4px 8px; cursor: pointer; color: #444; font-size: 12px; user-select: none; }
.tree-folder-label:hover { background: #eee; }
.tree-folder-label .icon { font-size: 10px; color: #888; width: 12px; }
.tree-notes { padding-left: 8px; }
.tree-note { padding: 3px 8px 3px 20px; cursor: pointer; font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-note:hover { background: #eee; }
.tree-note.active { background: #222; color: #fff; }
.tree-unsorted { padding: 8px 8px 2px; font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

/* EDITOR */
.editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
.editor-titlebar { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 44px; border-bottom: 1px solid #eee; flex-shrink: 0; gap: 12px; }
.editor-titlebar input { border: none; outline: none; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; flex: 1; background: transparent; }
.editor-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.save-status { font-size: 11px; color: #aaa; }
.save-status.saving { color: #f80; }
.save-status.saved { color: #080; }
.save-status.error { color: #c00; }
.share-btn { font-size: 11px; border: 1px solid #ccc; padding: 4px 10px; background: #fff; cursor: pointer; color: #333; }
.tags-input { font-size: 11px; border: 1px solid #eee; padding: 3px 6px; color: #666; min-width: 80px; }
.editor-area { flex: 1; overflow: hidden; }
.editor-area .CodeMirror { height: 100%; }
.editor-area .EasyMDEContainer { height: 100%; display: flex; flex-direction: column; }
.editor-area .EasyMDEContainer .CodeMirror { flex: 1; }
.editor-statusbar-custom { padding: 0 16px; height: 26px; border-top: 1px solid #eee; background: #fafafa; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.editor-statusbar-custom span { font-size: 11px; color: #999; }

/* EMPTY STATE */
.empty-state { display: flex; align-items: center; justify-content: center; flex: 1; color: #aaa; font-size: 13px; }

/* NOTIFICATIONS */
#notification { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 8px 16px; font-size: 12px; z-index: 1000; display: none; border-radius: 2px; }
#notification.error { background: #c00; }

/* CONFLICT MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; display: none; align-items: center; justify-content: center; }
.modal { background: #fff; border: 1px solid #ccc; padding: 24px; max-width: 480px; width: 90%; }
.modal h2 { font-size: 15px; margin-bottom: 8px; }
.modal p { font-size: 12px; color: #666; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 6px 14px; font-size: 12px; border: 1px solid #ccc; cursor: pointer; background: #fff; }
.modal-actions button.primary { background: #222; color: #fff; border-color: #222; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>thornotes</h1>
    <p class="tagline">Your notes. Your files. Your server.</p>
    <div id="auth-form-login">
      <label>Username</label>
      <input id="login-username" type="text" autocomplete="username" />
      <label>Password</label>
      <input id="login-password" type="password" autocomplete="current-password" />
      <button onclick="login()">Sign in</button>
      <div class="switch-link"><a onclick="showRegister()">Create account</a></div>
      <div class="error" id="login-error"></div>
    </div>
    <div id="auth-form-register" style="display:none">
      <label>Username</label>
      <input id="reg-username" type="text" autocomplete="username" />
      <label>Password (min 12 characters)</label>
      <input id="reg-password" type="password" autocomplete="new-password" />
      <button onclick="register()">Create account</button>
      <div class="switch-link"><a onclick="showLogin()">Sign in instead</a></div>
      <div class="error" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <span class="logo">thornotes</span>
    <span class="user">
      <span id="topbar-username"></span>&nbsp;·&nbsp;
      <button onclick="logout()">Sign out</button>
    </span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-toolbar">
        <button onclick="promptCreateNote()">+ Note</button>
        <button onclick="promptCreateFolder()">+ Folder</button>
      </div>
      <div class="sidebar-search">
        <input id="search-input" type="search" placeholder="Search notes…" oninput="onSearch(this.value)" />
      </div>
      <div class="tree" id="tree"></div>
    </div>
    <div class="editor-pane" id="editor-pane">
      <div class="empty-state" id="empty-state">Select or create a note</div>
      <div id="editor-container" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="editor-titlebar">
          <input id="note-title" type="text" placeholder="Note title" onchange="onTitleChange()" />
          <div class="editor-meta">
            <input id="note-tags" type="text" class="tags-input" placeholder="tags, comma, separated" onchange="onTagsChange()" title="Tags (comma-separated)" />
            <span class="save-status" id="save-status">Saved</span>
            <button class="share-btn" onclick="shareNote()">Share ↗</button>
          </div>
        </div>
        <div class="editor-area" id="editor-area"></div>
        <div class="editor-statusbar-custom">
          <span id="note-path"></span>
          <span id="note-stats"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONFLICT MODAL -->
<div class="modal-overlay" id="conflict-modal">
  <div class="modal">
    <h2>Edit conflict</h2>
    <p>This note was modified from another location. Your changes and the server version conflict.</p>
    <div class="modal-actions">
      <button onclick="resolveConflict('discard')">Discard my changes</button>
      <button class="primary" onclick="resolveConflict('overwrite')">Overwrite with my version</button>
    </div>
  </div>
</div>

<div id="notification"></div>

<script src="/static/js/vendor/easymde.min.js"></script>
<script src="/static/js/vendor/marked.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
