name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Lint Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: latest
          install-mode: goinstall

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Lint Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Lint Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  test-js:
    name: Test (JS)
    runs-on: ubuntu-latest
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - JS Test Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Run JS tests
        run: |
          node --test web/static/js/table-utils.test.js
          node --test desktop/lib.test.js

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - JS Test Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - JS Test Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  test-wails:
    name: Desktop Wails (build + test)
    runs-on: ubuntu-22.04
    if: false  # disabled until webkit2gtk CI stabilises
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Wails Test Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: desktop-wails/go.sum
      - name: Install Wails system dependencies (webkit2gtk + systray)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev
      - name: Build check (CGO + Wails)
        run: cd desktop-wails && go build ./...
      - name: Test (all packages)
        run: cd desktop-wails && go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage report
        run: cd desktop-wails && go tool cover -func=coverage.out | tail -1

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Wails Test Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Wails Test Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  build-desktop:
    name: Desktop (syntax check)
    runs-on: ubuntu-latest
    if: false  # disabled
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Desktop Check Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Syntax check desktop sources
        run: node --check desktop/main.js desktop/preload.js desktop/lib.js

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Desktop Check Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Desktop Check Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: thornotes_test
          MARIADB_USER: thornotes
          MARIADB_PASSWORD: thornotes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Test Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          THORNOTES_TEST_MYSQL_DSN: "thornotes:thornotes@tcp(127.0.0.1:3306)/thornotes_test?parseTime=true"
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Test Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Test Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test, test-js]
    # Run on pushes to main OR on version tag pushes (v*)
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Build Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      # QEMU enables cross-compilation for non-native platforms (arm64 on amd64 runners).
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            th0rn0/thornotes:latest
            th0rn0/thornotes:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Build Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Build Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build-push]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Discord Webhook Action - Smoke Test Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Smoke Test Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Pull image
        run: docker pull th0rn0/thornotes:latest

      - name: Start container
        run: |
          mkdir -p /tmp/smoke-data/notes
          chmod -R 777 /tmp/smoke-data
          docker run -d \
            --name thornotes-smoke \
            -p 8080:8080 \
            -v /tmp/smoke-data:/data \
            th0rn0/thornotes:latest

      - name: Wait for HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "Server is up (attempt $i)"
              exit 0
            fi
            echo "Waiting for server... ($i/15)"
            sleep 1
          done
          echo "Server did not respond after 15s"
          docker logs thornotes-smoke
          exit 1

      - name: Stop container
        if: always()
        run: |
          docker stop thornotes-smoke 2>/dev/null || true
          docker rm thornotes-smoke 2>/dev/null || true

      - name: Discord Webhook Action - Smoke Test Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Smoke Test Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Smoke Test Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Smoke Test Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [smoke-test]
    # Only create a GitHub release when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Extract changelog for this release
        id: changelog
        run: |
          # Pull the section for this version from CHANGELOG.md
          awk '/^## \['"${{ steps.version.outputs.version }}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > release_notes.md
          echo "Release notes written"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md

      - name: Discord Webhook Action - Release
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - v${{ steps.version.outputs.version }} Released!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
          embed-description: Docker image pushed and GitHub release created.

  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    if: false  # disabled
    steps:
      - name: Discord Webhook Action - Build Start
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Android Build Started!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5aac3b89a9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4
        with:
          gradle-version: '8.7'
          cache-read-only: false

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: gradle assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: thornotes-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: thornotes-release-unsigned.apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      - name: Discord Webhook Action - Build Success
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Android Build Success!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

      - name: Discord Webhook Action - Build Failure
        if: failure()
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - ${{ github.head_ref || github.ref_name }} - Android Build Failure!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          embed-description: ${{ github.event.head_commit.message }}

  release-android:
    name: Android Release
    runs-on: ubuntu-latest
    needs: [release, build-android]
    if: false  # disabled
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download release APK
        uses: actions/download-artifact@fa0a91b85d4f404e444306b2a2d2da43bf6d8b63 # v4
        with:
          name: thornotes-release-unsigned.apk
          path: apk/

      - name: Attach APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ steps.version.outputs.version }} \
            apk/app-release-unsigned.apk#thornotes-v${{ steps.version.outputs.version }}-android-unsigned.apk

      - name: Discord Webhook Action - Android Release
        uses: tsickert/discord-webhook@86dc739f3f165f16dadc5666051c367efa1692f4 # v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: ${{ github.repository }} - v${{ steps.version.outputs.version }} - Android APK attached!
          embed-url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
          embed-description: Unsigned APK attached to GitHub release — sign locally with apksigner before distributing.
