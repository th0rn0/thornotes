version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck     # unchecked error return values
    - govet        # reports suspicious Go constructs
    - staticcheck  # comprehensive static analysis (SA*, QF*, S*, ST* checks)
    - ineffassign  # detects assignments to variables that are never used after
    - unused       # checks for unused constants, variables, functions, and types
  settings:
    errcheck:
      # Ignore common idiomatic patterns where the caller cannot usefully act on the error.
      exclude-functions:
        # HTTP response writes: if the connection is broken the error is not actionable.
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprint
        # Deferred resource closes: the error is secondary to the primary operation.
        - (*os.File).Close
        - (io.Closer).Close
        - (*io.PipeWriter).Close
        - (*mime/multipart.Writer).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        # Cleanup operations where failure doesn't affect program correctness.
        - os.Remove
        - os.Unsetenv
